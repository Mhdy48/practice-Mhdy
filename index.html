<!doctype html>
<html lang="en">
  <head>
    <!-- Meta Settings -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Main Styles -->
    <link rel="stylesheet" href="style.css" />
    <!-- Chillax Font -->
    <link rel="stylesheet" href="Chillax_Complete/Fonts/WEB/css/chillax.css" />
    <!-- Fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Title Web -->
    <title>Practice - Mhdy</title>
    <style>
      
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <!-- Header Container -->
      <div class="container">
        <!-- Brand Section -->
        <div class="header__brand">
          <!-- Logo -->
          <a href="#" class="header__logo">
            <img
              class="header__logo-image"
              src="img/Abstract logo.png"
              alt="Abstract Logo"
            />
            <span class="header__logo-title">Abstract</span>
          </a>
          <!-- Divider -->
          <span class="header__separator">|</span>
          <!-- Help Center Link -->
          <a href="#" class="header__help"> Help Center </a>
        </div>
        <!-- Header Actions -->
        <nav class="header__actions">
          <!-- Submit Request Button -->
          <a href="#" class="btn btn--outline"> Submit a request </a>
          <!-- Sign In Button -->
          <a href="#" class="btn btn--primary"> Sign in </a>
        </nav>
      </div>
    </header>
    <!-- Hero Section -->
    <section class="hero">
      <!-- Hero Container -->
      <div class="container">
        <!-- Hero Content -->
        <div class="hero__content">
          <!-- Hero Title -->
          <h2 class="hero__title">How can we help?</h2>
          <!-- Search Form -->
          <form class="hero__search">
            <input type="text" class="hero__input" placeholder="search" />
            <button class="hero__button" type="submit">
              <!-- Arrow Icon -->
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
